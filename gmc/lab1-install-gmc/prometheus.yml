global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gemfire-cluster'
    # This tells Prometheus v3 how to handle GemFire's missing Content-Type header
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets:
          - 'gf-locator1:8001'
          - 'gf-locator2:8002'
          - 'gf-server1:8003'
          - 'gf-server2:8004'
          - 'gf-server3:8005'
