plugins {


    id 'org.springframework.boot' version '3.2.0' // Use a version compatible with your Java

    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()

  maven {
    credentials {
      username "$gemfireRepoUsername"
      password "$gemfireRepoPassword"
    }
    url = uri("https://packages.broadcom.com/artifactory/gemfire/")
  }

}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava




  implementation "com.vmware.gemfire:spring-boot-3.1-gemfire-10.1:1.0.0"
  implementation "com.vmware.gemfire:gemfire-core:10.0.0"
  implementation "com.vmware.gemfire:gemfire-logging:10.0.0"
  // if using continuous queries
  implementation "com.vmware.gemfire:gemfire-cq:10.0.0"


}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.example.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
